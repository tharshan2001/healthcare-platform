services:
  # Databases
  postgres-patient:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: patient_pass
      POSTGRES_DB: patient_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_patient_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-doctor:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: doctor_user
      POSTGRES_PASSWORD: doctor_pass
      POSTGRES_DB: doctor_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_doctor_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-appointment:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: appointment_pass
      POSTGRES_DB: appointment_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_appointment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointment_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-telemedicine:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: telemedicine_user
      POSTGRES_PASSWORD: telemedicine_pass
      POSTGRES_DB: telemedicine_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_telemedicine_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemedicine_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_pass
      POSTGRES_DB: notification_db
    ports:
      - "5437:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Microservices
  patient-service:
    build: ./services/patient
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://patient_user:patient_pass@postgres-patient:5432/patient_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:8006
      - DOCTOR_SERVICE_URL=http://doctor-service:8002
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8003
    depends_on:
      postgres-patient:
        condition: service_healthy
      notification-service:
        condition: service_started

  doctor-service:
    build: ./services/doctor
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://doctor_user:doctor_pass@postgres-doctor:5432/doctor_db
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8003
    depends_on:
      postgres-doctor:
        condition: service_healthy

  appointment-service:
    build: ./services/appointment
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://appointment_user:appointment_pass@postgres-appointment:5432/appointment_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:8006
      - REDIS_HOST=redis
    depends_on:
      postgres-appointment:
        condition: service_healthy
      redis:
        condition: service_healthy

  telemedicine-service:
    build: ./services/telemedicine_service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://telemedicine_user:telemedicine_pass@postgres-telemedicine:5432/telemedicine_db
      - DOCTOR_SERVICE_URLS=http://doctor-service:8002
      - PATIENT_SERVICE_URLS=http://patient-service:8001
      - APPOINTMENT_SERVICE_URLS=http://appointment-service:8003
    depends_on:
      postgres-telemedicine:
        condition: service_healthy

  payment-service:
    build: ./services/payment
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://payment_user:payment_pass@postgres-payment:5432/payment_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:8006
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
    depends_on:
      postgres-payment:
        condition: service_healthy

  notification-service:
    build: ./services/notification
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://notification_user:notification_pass@postgres-notification:5432/notification_db
    depends_on:
      postgres-notification:
        condition: service_healthy

  ai-symptom-service:
    build: ./services/ai_symptom
    ports:
      - "8007:8007"
    volumes:
      - ./services/ai_symptom/faiss_index:/app/faiss_index
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8001
      - VITE_DOCTOR_API=http://localhost:8002
      - VITE_AI_SYMPTOM_API=http://localhost:8007
    depends_on:
      - patient-service
      - doctor-service

volumes:
  postgres_patient_data:
  postgres_doctor_data:
  postgres_appointment_data:
  postgres_telemedicine_data:
  postgres_payment_data:
  postgres_notification_data: