version: '3.8'

services:
  # PostgreSQL Database for Telemedicine Service
  telemedicine_db:
    image: postgres:15
    container_name: telemedicine_db
    environment:
      POSTGRES_DB: telemedicine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - telemedicine_data:/var/lib/postgresql/data
      - ./database/init_schemas/telemedicine_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telemedicine_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare_network

  # Telemedicine Service
  telemedicine_service:
    build:
      context: ./services/telemedicine_service
      dockerfile: Dockerfile
    container_name: telemedicine_service
    ports:
      - "8004:8000"
    depends_on:
      telemedicine_db:
        condition: service_healthy
    env_file:
      - ./services/telemedicine_service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@telemedicine_db:5432/telemedicine_db
    networks:
      - healthcare_network
    restart: unless-stopped

networks:
  healthcare_network:
    driver: bridge

volumes:
  ai_symptom_data:
  telemedicine_data:
  redis_data:
